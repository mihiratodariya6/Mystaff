name: Build MyStaff APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mystaff
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'
    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    - run: flutter pub get
    - run: flutter build apk --release --target-platform android-arm64
    - uses: actions/upload-artifact@v3
      with:
        name: MyStaff-APK
        path: mystaff/build/app/outputs/flutter-apk/app-release.apk
