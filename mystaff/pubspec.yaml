name: mystaff
description: "A new Flutter project for staff management."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 💳 આ તમારું પેમેન્ટ એન્જિન (Razorpay)
  razorpay_flutter: ^1.3.7

  # --- UI & Components ---
  cupertino_icons: ^1.0.8
  intl_phone_field: ^3.2.0 

  # --- Features ---
  url_launcher: ^6.3.0
  table_calendar: ^3.1.2
  image_picker: ^1.1.2

  # --- Reports & Sharing ---
  pdf: ^3.12.0
  printing: ^5.14.3
  share_plus: ^12.0.2

  # --- Data, Auth & Tracking ---
  csc_picker_plus: ^0.0.3
  intl: ^0.20.2
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  shared_preferences: ^2.5.5
  file_picker: ^10.3.10
  firebase_storage: ^13.2.0
  geolocator: ^14.0.2
  google_sign_in: 6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

# 👇 અહી તમારું એપ આઇકન સેટિંગ છે 👇
# 👇 અહી તમારું એપ આઇકન સેટિંગ છે 👇
flutter_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"           # ahya app_icon.png kari de
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/app_icon.png"  # ahya pan app_icon.png kari de

flutter:
  uses-material-design: true

  # 🖼️ Assets configuration
  assets:
    - assets/logo.png