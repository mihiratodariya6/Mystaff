name: mystaff
description: "A new Flutter project for staff management."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- UI & Components ---
  cupertino_icons: ^1.0.8
  
  # 🛑 આ લાઈન તમારા કોડમાં નહોતી, એટલે એરર આવતી હતી
  intl_phone_field: ^3.2.0 

  # --- Features ---
  url_launcher: ^6.3.0
  table_calendar: ^3.1.2
  image_picker: ^1.1.2

  # --- Global Location (Fixed Version) ---
  csc_picker_plus: ^0.0.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # 🖼️ Assets configuration
  assets:
    - assets/logo.png